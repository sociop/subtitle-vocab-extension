<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Subtitle Vocab Catcher — настройки</title>
  <style>
    html {
      height: auto;
      margin: 0;
    }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      height: auto;
      margin: 0;
      padding: 10px 10px 6px;
      background: #1e1e1e;
      color: #eee;
      display: block;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-size: 13px;
      color: #aaa;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #357ab8;
    }
    #status {
      margin-top: 4px;
      font-size: 13px;
      color: #6ecb63;
      min-height: 0;
    }
    h3 {
      margin: 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <h3>Subtitle Vocab Catcher</h3>

  <label for="deeplApiKey">DeepL API ключ</label>
  <input id="deeplApiKey" type="password" autocomplete="off" placeholder="xxxxxxxx-xxxx-xxxx:fx" />

  <label for="deeplHost">DeepL хост</label>
  <input id="deeplHost" type="text" placeholder="https://api-free.deepl.com" />

  <label for="deckName">Колода Anki</label>
  <input id="deckName" type="text" placeholder="Subtitles" />

  <label for="modelName">Тип карточки (Note Type)</label>
  <input id="modelName" type="text" placeholder="Basic" />

  <button id="save">Сохранить</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
